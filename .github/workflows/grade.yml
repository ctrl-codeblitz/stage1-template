name: Grade Submissions

on:
  push:
    branches:
      - main
    paths:
      - 'solutions/**'

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Make script executable
        run: chmod +x grade.sh
      
      - name: Run grading script
        run: ./grade.sh
